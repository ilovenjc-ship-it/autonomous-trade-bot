[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# healthcheckPath + timeout: Railway waits up to 120s for /health to return 200
# before marking the deploy healthy. Prevents premature restart during slow boot.
healthcheckPath = "/health"
healthcheckTimeout = 120

# restartPolicyType = ALWAYS: Railway restarts the container on any exit.
# No maxRetries cap — the bot must run continuously.
# Railway applies exponential backoff after repeated restarts.
restartPolicyType = "ALWAYS"