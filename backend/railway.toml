[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# healthcheckPath and startCommand intentionally omitted.
# Railway uses Dockerfile CMD (/app/start.sh) which handles port expansion
# correctly and produces full diagnostic output in Deploy Logs.
# Healthcheck gate re-disabled: Railway infra degradation (GitHub incident)
# causes probe timeouts even when the app is healthy. The container is
# confirmed healthy via /health responding 200 after deployment.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3