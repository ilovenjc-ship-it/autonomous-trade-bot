[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No healthcheckPath — let Railway deploy without health gate so we can see
# what the container actually does. Re-enable once port-open is confirmed.
# healthcheckPath = "/health"
# healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3