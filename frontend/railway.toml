[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[deploy]
# Express proxy server: serves the React SPA and forwards /api/* to the
# backend via Railway's internal private network (no CORS issues).
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10